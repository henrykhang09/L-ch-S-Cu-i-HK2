<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ôn tập Lịch sử lớp 11 - Premium Study</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* =========================================
           TÙY CHỈNH CÁ NHÂN HÓA
           ========================================= */
        :root {
            --badge-color: #94a3b8; 
            --badge-size: 14px;      
            --badge-weight: 700;     
            
            /* Bảng màu hệ thống */
            --bg-main: #0f172a; 
            --text-main: #f8fafc; 
            --text-muted: #cbd5e1; 
            --primary: #6366f1; 
            --primary-hover: #4f46e5; 
            --success: #10b981; 
            --success-bg: rgba(16, 185, 129, 0.15);
            --danger: #ef4444; 
            --danger-bg: rgba(239, 68, 68, 0.15);
            --warning: #facc15; 
            --border-glass: rgba(255, 255, 255, 0.1);
            --ai-gradient: linear-gradient(135deg, #a855f7, #ec4899, #f43f5e);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3, h4, .app-title, .score-number, .timer-display {
            font-family: 'Nunito', sans-serif;
        }

        body, p, button, span, div {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #020617 0%, #1e1b4b 50%, #0f172a 100%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
        }
        body::before {
            width: 400px; height: 400px;
            background: rgba(99, 102, 241, 0.3); 
            top: -100px; left: -100px;
        }
        body::after {
            width: 300px; height: 300px;
            background: rgba(236, 72, 153, 0.2); 
            bottom: -50px; right: -50px;
        }

        .creator-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--badge-color);
            font-size: var(--badge-size);
            font-weight: var(--badge-weight);
            font-family: 'Nunito', sans-serif;
            letter-spacing: 0.5px;
            z-index: 100;
            opacity: 0.8;
            transition: 0.3s;
        }
        .creator-badge:hover { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .app-container {
            width: 100%;
            max-width: 650px;
            margin-top: 4vh;
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-glass);
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ---------------- MENU ---------------- */
        #home-screen { text-align: center; }
        
        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .app-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.5;
        }

        .settings-box {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid var(--border-glass);
        }

        .settings-box label {
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .lesson-grid { display: flex; flex-direction: column; gap: 15px; }

        .lesson-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 18px;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .lesson-btn span.icon { 
            font-size: 24px; 
            background: rgba(255,255,255,0.08);
            width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px;
        }

        .lesson-btn:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .lesson-btn:active { transform: translateY(1px); }

        .lesson-btn.all-btn {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border: none;
            color: white;
            justify-content: center;
            margin-top: 15px;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
            font-family: 'Nunito', sans-serif;
            font-size: 18px;
            font-weight: 800;
        }
        .lesson-btn.all-btn:hover { box-shadow: 0 12px 30px rgba(99, 102, 241, 0.7); }

        /* ---------------- QUIZ SCREEN ---------------- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.1); }

        .header-stats {
            display: flex;
            gap: 15px;
            font-size: 15px;
            font-weight: 700;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-glass);
            align-items: center;
        }

        .timer-display {
            color: var(--warning);
            font-weight: 800;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 1px;
        }
        .timer-display.danger { color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .stat-q { color: var(--text-muted); }

        .progress-track {
            width: 100%;
            height: 8px;
            background-color: rgba(0,0,0,0.4);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, var(--primary));
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        .question-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 30px;
        }

        h2.question {
            font-size: 21px;
            font-weight: 800;
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            flex: 1;
        }

        .flag-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-glass);
            color: var(--text-muted);
            border-radius: 12px;
            width: 44px; height: 44px;
            font-size: 20px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .flag-btn:hover { background: rgba(255,255,255,0.1); }
        .flag-btn.active {
            background: rgba(250, 204, 21, 0.2);
            border-color: var(--warning);
            color: var(--warning);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }

        /* Options */
        .options-list { display: flex; flex-direction: column; gap: 14px; }

        .option-btn {
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 18px 24px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            color: var(--text-main);
            font-weight: 500;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
        }

        .option-btn:hover:not(:disabled) {
            border-color: rgba(255,255,255,0.3);
            background-color: rgba(255,255,255,0.08);
            transform: scale(1.01);
        }

        .option-btn:disabled { cursor: default; }

        .option-btn.correct {
            background-color: var(--success-bg);
            border-color: var(--success);
            color: #ffffff;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .option-btn.wrong {
            background-color: var(--danger-bg);
            border-color: var(--danger);
            color: #ffffff;
            opacity: 0.9;
        }

        .option-btn.show-correct {
            border: 2px dashed var(--success);
            background-color: var(--success-bg);
            color: var(--success);
            font-weight: 700;
        }

        /* EXPLANATION BOX */
        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-left: 5px solid var(--primary);
            display: none;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .explanation-box.show { display: block; }
        .explanation-box h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .explanation-box p {
            font-size: 15px; line-height: 1.6; color: var(--text-main); margin-bottom: 15px;
        }
        .highlight-text {
            color: var(--warning);
            font-weight: 700;
            background: rgba(250, 204, 21, 0.1);
            padding: 2px 6px; border-radius: 4px;
        }

        .ai-btn {
            background: var(--ai-gradient);
            color: white; border: none; border-radius: 12px;
            padding: 12px 20px; font-size: 15px; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }
        .ai-btn:hover {
            opacity: 0.95; transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
        }

        .ai-response {
            margin-top: 15px; padding: 20px;
            background: rgba(0, 0, 0, 0.3); border-radius: 12px;
            font-size: 15px; line-height: 1.6; color: #f1f5f9;
            display: none; border: 1px solid rgba(236, 72, 153, 0.3);
            border-left: 4px solid #ec4899;
        }
        .ai-response.loading { display: flex; align-items: center; gap: 10px; color: #f472b6; font-style: italic; }
        .ai-response.show { display: block; animation: slideDown 0.3s ease; }
        .ai-response b, .ai-response strong { color: #f472b6; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .next-btn {
            background: var(--text-main); color: var(--bg-main);
            border: none; border-radius: 16px; padding: 18px;
            font-size: 18px; font-family: 'Nunito', sans-serif; font-weight: 800;
            cursor: pointer; width: 100%; margin-top: 25px; display: none;
            transition: all 0.2s; box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        .next-btn:hover { background: #e2e8f0; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,255,255,0.3); }

        /* ---------------- RESULT SCREEN ---------------- */
        #result-screen { text-align: center; }
        .result-icon { font-size: 70px; margin-bottom: 15px; }
        .result-title { font-size: 28px; font-weight: 900; color: var(--text-main); margin-bottom: 10px; }
        
        .score-display {
            background: rgba(0,0,0,0.3); border-radius: 20px; padding: 40px;
            margin: 25px 0; border: 1px solid var(--border-glass);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .score-number {
            font-family: 'Nunito', sans-serif; font-size: 56px; font-weight: 900;
            background: linear-gradient(to bottom, #38bdf8, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; margin-bottom: 15px;
        }

        .action-buttons {
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;
        }
        .retry-btn {
            background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger);
            color: var(--danger); padding: 16px; border-radius: 16px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .retry-btn:hover { background: var(--danger); color: white; }

        .review-section { margin-top: 40px; text-align: left; }
        .review-section h3 {
            font-size: 18px; color: var(--warning); margin-bottom: 20px;
            padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .review-item {
            background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin-bottom: 15px;
            border-right: 1px solid var(--border-glass); border-top: 1px solid var(--border-glass); border-bottom: 1px solid var(--border-glass);
        }
        .review-item.wrong-item { border-left: 4px solid var(--danger); }
        .review-item.flagged-item { border-left: 4px solid var(--warning); }
        .q-text { font-weight: 600; margin-bottom: 10px; font-size: 15px; line-height: 1.5; color: #f8fafc;}
        .ans-correct { color: var(--success); font-weight: 700; font-size: 14px; margin-top: 8px;}

        /* Mobile Responsive */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 30px 20px; border-radius: 24px; }
            h2.question { font-size: 18px; }
            .option-btn { font-size: 15px; padding: 16px; }
            .app-title { font-size: 26px; }
            .creator-badge { top: 10px; right: 10px; font-size: 12px;}
            .timer-display { font-size: 14px; }
        }

    </style>
</head>
<body>

    <div class="creator-badge">by Duy Khang</div>

    <div class="app-container">
        
        <div id="home-screen" class="card">
            <div class="logo-icon">🏛️</div>
            <h1 class="app-title">Ôn tập Lịch sử lớp 11</h1>
            <p class="app-subtitle">Nền tảng ôn tập thông minh với hệ thống giải thích đáp án giúp ghi nhớ sâu.</p>
            
            <div class="settings-box">
                <label>
                    <input type="checkbox" id="shuffle-toggle" class="custom-checkbox" checked>
                    🔀 Trộn ngẫu nhiên câu hỏi
                </label>
            </div>

            <div class="lesson-grid">
                <button class="lesson-btn" onclick="startQuiz(11)">
                    <span class="icon">👑</span> <div>Bài 11: Cải cách Minh Mạng</div>
                </button>
                <button class="lesson-btn" onclick="startQuiz(12)">
                    <span class="icon">🌊</span> <div>Bài 12: Vị trí Biển Đông</div>
                </button>
                <button class="lesson-btn" onclick="startQuiz(13)">
                    <span class="icon">🇻🇳</span> <div>Bài 13: Việt Nam & Biển Đông</div>
                </button>
                <button class="lesson-btn all-btn" onclick="startQuiz('all')">
                    🚀 THI THỬ TOÀN BỘ (91 CÂU)
                </button>
            </div>
        </div>

        <div id="quiz-screen" class="card" style="display: none;">
            <div class="quiz-header">
                <button class="header-btn" onclick="goHome()">❮ Thoát</button>
                <div class="header-stats">
                    <span class="timer-display" id="timer-display">⏱️ 00:00</span>
                    <span class="stat-q">Câu <span id="current-q">1</span>/<span id="total-q">91</span></span>
                </div>
            </div>
            
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            
            <div class="question-container">
                <h2 class="question" id="question-text">Đang tải câu hỏi...</h2>
                <button id="flag-btn" class="flag-btn" onclick="toggleFlag()" title="Đánh dấu câu này để xem lại">🚩</button>
            </div>
            
            <div class="options-list" id="options-container">
                </div>

            <div id="explanation-box" class="explanation-box">
                <h4>💡 Kiến thức cần nhớ</h4>
                <p id="explanation-text"></p>
                <button id="ai-explain-btn" class="ai-btn" onclick="askGeminiAI()">
                    ✨ Giải thích sâu bằng AI
                </button>
                <div id="ai-response-container" class="ai-response"></div>
            </div>

            <button id="next-btn" class="next-btn" onclick="nextQuestion()">Tiếp tục ➔</button>
        </div>

        <div id="result-screen" class="card" style="display: none;">
            <div class="result-icon">🏆</div>
            <h2 class="result-title">Đã nộp bài!</h2>
            <p style="color: var(--text-muted);">Đã đến lúc nhìn lại kết quả của bạn</p>
            
            <div class="score-display">
                <div class="score-number" id="score-text">0/0</div>
                <div style="color: var(--text-muted); font-size: 15px; font-weight: 600;" id="accuracy-text">Tỉ lệ chính xác: 0%</div>
            </div>
            
            <div class="action-buttons">
                <button class="lesson-btn all-btn" style="width: 100%; margin-top: 0;" onclick="goHome()">Hoàn tất & Về trang chủ</button>
                <button class="retry-btn" id="retry-btn" style="display:none;" onclick="startQuiz('retry')">🔄 Chỉ làm lại các câu đã sai</button>
            </div>

            <div class="review-section" id="review-section">
                <h3>📌 Đánh giá chi tiết (Câu sai & Đánh dấu):</h3>
                <div id="review-list">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH GEMINI API
        // ==========================================
        const apiKey = ""; 
        const modelEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function askGeminiAI() {
            const aiBtn = document.getElementById('ai-explain-btn');
            const aiResponseContainer = document.getElementById('ai-response-container');
            
            const currentQuiz = activeQuizData[currentQuestionIndex];
            const questionStr = currentQuiz.question;
            const correctAnsStr = currentQuiz.options[currentQuiz.correctIndex];

            aiBtn.style.display = 'none';
            aiResponseContainer.className = 'ai-response loading';
            aiResponseContainer.innerHTML = '✨ AI đang suy nghĩ bối cảnh lịch sử...';
            
            const prompt = `Bạn là một giáo viên Lịch sử Việt Nam tâm huyết. Hãy giải thích ngắn gọn, sinh động và dễ hiểu cho học sinh lớp 11 về câu hỏi trắc nghiệm sau đây:
Câu hỏi: "${questionStr}"
Đáp án đúng là: "${correctAnsStr}"
Hãy giải thích ngắn gọn tại sao đáp án này đúng và chia sẻ một chút bối cảnh lịch sử liên quan (tối đa 3-4 câu). Không lặp lại toàn bộ câu hỏi. Sử dụng định dạng văn bản bình thường, có thể dùng in đậm để nhấn mạnh các từ khóa quan trọng.`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],

            { lesson: 13, question: "Câu 26: Văn kiện nào sau đây được kí kết giữa các nước ASEAN và Trung Quốc nhằm duy trì hòa bình và ổn định ở Biển Đông?", options: ["A. Luật Biển Việt Nam", "B. Tuyên bố về ứng xử của các bên ở Biển Đông (DOC)", "C. Luật Biên giới quốc gia", "D. Tuyên bố vùng biển Việt Nam"], correctIndex: 1 },
            { lesson: 13, question: "Câu 27: Văn kiện nào sau đây do Nhà nước Việt Nam ban hành, khẳng định chủ quyền của nước ta đối với quần đảo Hoàng Sa và Trường Sa?", options: ["A. Luật Biển Việt Nam", "B. Tuyên bố về ứng xử các bên", "C. Luật Cảnh sát biển Việt Nam", "D. Hiến chương Liên hợp quốc"], correctIndex: 0 },
            { lesson: 13, question: "Câu 28. Tại hội nghị Xan Phran-xi-xcô (1951), khi chủ quyền của VN đối với Hoàng Sa và Trường Sa được tuyên bố không bị phản đối. Điều đó cho thấy", options: ["A. tính pháp lý quốc tế và lịch sử về chủ quyền của Việt Nam.", "B. đây là những quần đảo không có giá trị cao về kinh tế.", "C. đây là những quần đảo không có giá trị cao về quốc phòng.", "D. các quốc gia tham dự đều tuyệt đối tôn trọng luật Biển."], correctIndex: 0 },
            { lesson: 13, question: "Câu 29. Nội dung nào sau đây là một trong những khó khăn của Việt Nam trong việc bảo vệ chủ quyền trên Biển Đông hiện nay?", options: ["A. Sự bất đồng về quan điểm giữa các bên liên quan", "B. Lực lượng quân sự của ta quá yếu", "C. Các Ủy viên thường trực đều ủng hộ Trung Quốc.", "D. Thiếu các bằng chứng pháp lí."], correctIndex: 0 },
            { lesson: 13, question: "Câu 30: Sự kiện lịch sử nào sau đây liên quan đến những câu thơ 'Hát ru Người yên giấc ngủ ngàn thu... 64 người nhắm mắt'?", options: ["A. Pháp chuyển quyền kiểm soát Hoàng Sa", "B. Cuộc chiến đấu của các chiến sĩ hải quân Việt Nam trên đảo Gạc Ma", "C. Kí kết Tuyên bố về ứng xử DOC", "D. Tiếp quản Trường Sa từ chính quyền Sài Gòn"], correctIndex: 1 }
        ];

        let activeQuizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        
        let wrongAnswersData = []; 
        let flaggedQuestions = new Set();
        let isFlaggedCurrent = false;

        let timerInterval;
        let timeRemaining = 0; // Giây

        const homeScreen = document.getElementById('home-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const explanationBox = document.getElementById('explanation-box');
        const explanationText = document.getElementById('explanation-text');
        const progressBar = document.getElementById('progress-bar');
        const currentQLabel = document.getElementById('current-q');
        const totalQLabel = document.getElementById('total-q');
        const nextBtn = document.getElementById('next-btn');
        const flagBtn = document.getElementById('flag-btn');

        // Hàm xáo trộn mảng
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Khởi động đồng hồ
        function startTimer(minutes) {
            clearInterval(timerInterval);
            timeRemaining = minutes * 60;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("⏳ Hết giờ! Hệ thống sẽ tự động nộp bài.");
                    showResults();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            let s = (timeRemaining % 60).toString().padStart(2, '0');
            const display = document.getElementById('timer-display');
            display.innerText = `⏱️ ${m}:${s}`;
            
            // Đỏ nhấp nháy nếu còn dưới 1 phút
            if(timeRemaining <= 60 && timeRemaining > 0) {
                display.classList.add('danger');
            } else {
                display.classList.remove('danger');
            }
        }

        function startQuiz(mode) {
            if (mode === 'retry') {
                activeQuizData = [...wrongAnswersData];
            } else if (mode === 'all') {
                activeQuizData = [...masterQuizData];
            } else {
                activeQuizData = masterQuizData.filter(q => q.lesson === mode);
            }

            const isShuffle = document.getElementById('shuffle-toggle')?.checked;
            if (isShuffle && mode !== 'retry') {
                shuffleArray(activeQuizData);
            }

            homeScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            quizScreen.style.display = 'block';

            currentQuestionIndex = 0;
            score = 0;
            wrongAnswersData = [];
            flaggedQuestions.clear();
            
            totalQLabel.innerText = activeQuizData.length;
            
            // 1 phút cho mỗi câu hỏi
            startTimer(activeQuizData.length);
            
            loadQuestion();
        }

        function goHome() {
            clearInterval(timerInterval);
            homeScreen.style.display = 'block';
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'none';
        }

        function toggleFlag() {
            isFlaggedCurrent = !isFlaggedCurrent;
            if (isFlaggedCurrent) {
                flagBtn.classList.add('active');
                flaggedQuestions.add(activeQuizData[currentQuestionIndex]);
            } else {
                flagBtn.classList.remove('active');
                flaggedQuestions.delete(activeQuizData[currentQuestionIndex]);
            }
        }

        function loadQuestion() {
            const currentQuiz = activeQuizData[currentQuestionIndex];
            quizScreen.classList.remove('shake');
            
            questionText.innerText = currentQuiz.question;
            currentQLabel.innerText = currentQuestionIndex + 1;
            
            const progressPercentage = (currentQuestionIndex / activeQuizData.length) * 100;
            progressBar.style.width = progressPercentage + '%';

            nextBtn.style.display = 'none';
            explanationBox.classList.remove('show');
            document.getElementById('ai-explain-btn').style.display = 'flex';
            document.getElementById('ai-response-container').className = 'ai-response';
            document.getElementById('ai-response-container').innerHTML = '';
            optionsContainer.innerHTML = '';

            // Reset nút cờ
            isFlaggedCurrent = flaggedQuestions.has(currentQuiz);
            if(isFlaggedCurrent) flagBtn.classList.add('active');
            else flagBtn.classList.remove('active');

            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => checkAnswer(index, button);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex, selectedButton) {
            const currentQuiz = activeQuizData[currentQuestionIndex];
            const correctIndex = currentQuiz.correctIndex;
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            
            allButtons.forEach(btn => btn.disabled = true);

            let correctOptionText = currentQuiz.options[correctIndex].replace(/^[A-D]\.\s*/, '');

            if (selectedIndex === correctIndex) {
                selectedButton.classList.add('correct');
                score++;
                explanationText.innerHTML = `Lựa chọn cực kỳ chính xác! Hãy ghi nhớ: <br><span class="highlight-text">${correctOptionText}</span>`;
            } else {
                selectedButton.classList.add('wrong');
                quizScreen.classList.add('shake');
                allButtons[correctIndex].classList.add('show-correct');
                
                // Lưu lại object gốc để có thể nạp lại vào mảng thi
                wrongAnswersData.push(currentQuiz);

                explanationText.innerHTML = `Đừng lo, hãy ghi nhớ đáp án chính xác này nhé: <br><span class="highlight-text">${correctOptionText}</span>`;
            }

            explanationBox.classList.add('show');
            nextBtn.style.display = 'block';
            
            setTimeout(() => {
                nextBtn.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < activeQuizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function triggerConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function showResults() {
            clearInterval(timerInterval);
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';

            document.getElementById('score-text').innerText = `${score}/${activeQuizData.length}`;
            
            const accuracy = Math.round((score / activeQuizData.length) * 100);
            document.getElementById('accuracy-text').innerText = `Tỉ lệ chính xác: ${accuracy}%`;

            if (accuracy >= 50) triggerConfetti();

            // Hiển thị nút "Làm lại câu sai" nếu có câu sai
            const retryBtn = document.getElementById('retry-btn');
            if (wrongAnswersData.length > 0) {
                retryBtn.style.display = 'block';
            } else {
                retryBtn.style.display = 'none';
            }

            const reviewSection = document.getElementById('review-section');
            const reviewList = document.getElementById('review-list');
            
            if (wrongAnswersData.length > 0 || flaggedQuestions.size > 0) {
                reviewSection.style.display = 'block';
                reviewList.innerHTML = '';
                
                // Tạo Set gộp chung các câu cần ôn (Sai + Đánh dấu)
                let reviewSet = new Set([...wrongAnswersData, ...flaggedQuestions]);
                
                reviewSet.forEach(item => {
                    const isWrong = wrongAnswersData.includes(item);
                    const isFlagged = flaggedQuestions.has(item);
                    
                    const div = document.createElement('div');
                    div.classList.add('review-item');
                    if (isWrong) div.classList.add('wrong-item');
                    else if (isFlagged) div.classList.add('flagged-item');

                    let tagHtml = '';
                    if(isFlagged) tagHtml += '🚩 ';
                    if(isWrong) tagHtml += '❌ ';

                    div.innerHTML = `
                        <p class="q-text">${tagHtml} ${item.question}</p>
                        <p class="ans-correct">✓ ${item.options[item.correctIndex]}</p>
                    `;
                    reviewList.appendChild(div);
                });
            } else {
                reviewSection.style.display = 'none';
            }
        }
    </script>
</body>
